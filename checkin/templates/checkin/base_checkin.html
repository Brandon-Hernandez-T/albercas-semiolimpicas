<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ingreso rápido{% endblock %} — Albercas</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root {
      --bg: #0c4a6e;
      --card: #0f2d44;
      --text: #f0f9ff;
      --muted: #7dd3fc;
      --ok-bg: #064e3b;
      --ok-border: #34d399;
      --err-bg: #7f1d1d;
      --err-border: #fca5a5;
      --input: #164e63;
      --accent: #38bdf8;
      --accent-deep: #0284c7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #0c4a6e 0%, #082f49 50%, #0e7490 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1.5rem;
    }
    .top {
      width: 100%;
      max-width: 32rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      color: var(--muted);
    }
    .top a { color: var(--accent); }
    .card {
      width: 100%;
      max-width: 32rem;
      background: var(--card);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.45);
    }
    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.25rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.35rem; }
    input[type="text"] {
      width: 100%;
      font-size: 1.35rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 2px solid var(--input);
      background: #0b1220;
      color: var(--text);
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }
    button[type="submit"] {
      margin-top: 1rem;
      width: 100%;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
      color: #082f49;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(14, 165, 233, 0.35);
    }
    button[type="submit"]:hover { filter: brightness(1.06); }
    #result { margin-top: 1rem; min-height: 3.5rem; }
    .checkin-result {
      border-radius: 8px;
      padding: 1rem 1.1rem;
      font-size: 1.05rem;
      line-height: 1.4;
    }
    .checkin-result--ok {
      background: var(--ok-bg);
      border: 2px solid var(--ok-border);
      color: #dcfce7;
    }
    .checkin-result--err {
      background: var(--err-bg);
      border: 2px solid var(--err-border);
      color: #fee2e2;
    }
    .hint { margin-top: 0.75rem; font-size: 0.8rem; color: var(--muted); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>

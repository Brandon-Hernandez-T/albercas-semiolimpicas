<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Reportes{% endblock %} — Albercas</title>
  <style>
    :root {
      --bg: #0c4a6e;
      --card: #0f2d44;
      --text: #f0f9ff;
      --muted: #7dd3fc;
      --accent: #38bdf8;
      --accent-deep: #0284c7;
      --border: #164e63;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #0c4a6e 0%, #082f49 50%, #0e7490 100%);
      color: var(--text);
      padding: 1.25rem;
      min-height: 100vh;
    }
    a { color: var(--accent); }
    .wrap { max-width: 56rem; margin: 0 auto; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.4rem; }
    h2 { margin: 0 0 0.75rem; font-size: 1.1rem; }
    .muted { color: var(--muted); font-size: 0.9rem; }
    .grid { display: grid; gap: 0.75rem; grid-template-columns: repeat(auto-fit, minmax(14rem, 1fr)); }
    .report-link {
      display: block;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
    }
    .report-link:hover { border-color: var(--accent); }
    form .row { display: flex; flex-wrap: wrap; gap: 1rem; align-items: end; margin-bottom: 1rem; }
    label { display: block; font-size: 0.85rem; margin-bottom: 0.25rem; }
    input[type="date"], input[type="number"] {
      padding: 0.45rem 0.6rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
    }
    button, .btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: none;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
      color: #082f49;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    th, td { padding: 0.5rem 0.6rem; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); font-weight: 600; }
    .stat { font-size: 1.75rem; font-weight: 700; margin: 0.25rem 0; }
    .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.75rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <span>{{ request.user.get_username }}</span>
      <div>
        <a href="{% url 'reports:index' %}">Reportes</a> ·
        <a href="{% url 'admin:index' %}">Administración</a> ·
        <a href="{% url 'checkin:quick_checkin' %}">Ingreso rápido</a>
      </div>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
